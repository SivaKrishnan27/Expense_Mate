<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgotPassword</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #cadee4;
            color: black;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #d87979;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .h1 {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .h2 {
            font-size: 14px;
        }
        .headerBar {
            background-color: goldenrod;
            color: #3f362c;
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }

        .title {
            margin-bottom: 20px;
            color: #3f362c;
            font-size: 40px;
            font-weight: bold;
        }

        .topbar {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: normal;
        }

        .currency {
            font-size: 30px;
            font-weight: 300;
        }

        .balance {
            font-size: 30px;
            font-weight: 300;
        }

        .content {
            width: 780px;
            margin: 0 auto;
            padding: 3%;
            padding-left: 6%;
        }

        .secondTitle {
            background-color: #ffcb48;
            color: #333;
            text-align: center;
            padding: 20px;
            font-size: 25px;
        }

        .form {
            padding: 5px;
            padding-top: 20px;
            padding-left: 10%;
            justify-content: center;
            background-color: bisque;
        }

        .formLine {
            display: inline-flex;
            padding: 5px 0px;
        }

        .left {
            float: left;
        }

        .right {
            float: right;
            margin-right: 100px;
        }

        input,select {
            width: 130px;
            margin-left: 10px;
        }

        /* table style */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #8d712a;
            color: white;
            line-height: 30px;
        }

        tbody {
            background-color: bisque;
            line-height: 30px;
            text-align: center;
        }

        /* Button */

        button {
            width: 100px;
            color: #333;
            padding: 10px;
            text-align: center;
            font-size: 1.1em;
            line-height: 20px;
            background-color: #ffcb48;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 0 0 2px grey;
            transition: 0.5s;
        }

        a {
            text-decoration: underline;
            cursor: pointer;
        }
        form > button {
             width: 100px;
            color: #333;
            padding: 10px;
            text-align: center;
            font-size: 1.1em;
            line-height: 20px;
            background-color: #ffcb48;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
        }
        div > header{
            display: block;
            unicode-bidi: isolate;
        }
        form{
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: repeat(5, auto) auto;
            grid-gap: 10px 50px;
        }
    </style>
</head>
<body>
    <div class="headerBar">
        <header class="headerBar">
            <img src="Expense_Mate_logo.jpg" alt="Expense Mate Logo" height="50">
        </header>
    </div>
    <div class="content">
        <h1 class="secondTitle">Forgot Password</h1>
        <div class="form">
            <form id="expForm" action="Login.html" method="post">
                <table>
                    <tr>
                        <div class="formLine left">
                            <td><label for="username">Username:</label><br></td>
                            <td><input type="text" id="username" name="username" required><br><br></td>
                        </div>
                    </tr>
                    <tr>
                        <div class="formLine left">
                            <td><label for="email">Email:</label><br></td>
                            <td><input type="email" id="email" name="email" required><br><br></td>
                        </div>
                    </tr>
                    <tr>
                        <div class="formLine left">
                            <td><label for="phone">Phone Number:</label><br></td>
                            <td><input type="tel" id="phone" name="phone" required><br><br></td>
                        </div>
                    </tr>
                </table>
                <button type="submit">Submit</button><br><br>
                <a href="Login.html">Back to Login</a><br>
            </form>
        </div>
    </div>
</body>
</html>
