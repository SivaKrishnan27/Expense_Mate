<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Mate — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #060f06; --bg-card: #0a1f0a;
            --accent: rgb(51,197,51); --accent-bright: rgb(87,208,87);
            --accent-dim: #6db985; --border: rgba(51,197,51,0.2);
            --border-active: rgba(51,197,51,0.55);
        }
        * { box-sizing: border-box; padding: 0; margin: 0; }
        body {
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #000 0%, rgb(9,66,9) 100%);
            color: var(--accent);
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(51,197,51,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(51,197,51,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 40px rgba(51,197,51,0.1);
            animation: fadeUp 0.6s ease both;
            position: relative;
            z-index: 1;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logo-row {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .logo-row img {
            height: 52px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
        }
        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            color: var(--accent-dim);
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-dim);
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.88rem;
            padding: 11px 14px;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(51,197,51,0.1);
        }
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: var(--accent-bright);
            box-shadow: 0 0 20px rgba(51,197,51,0.4);
        }
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 22px 0;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: center;
        }
        .links a {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-dim);
            text-decoration: none;
            transition: color 0.2s;
        }
        .links a:hover { color: var(--accent); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-row">
            <img src="Expense_Mate_logo.jpg" alt="Expense Mate Logo">
        </div>
        <h1>Login</h1>
        <p class="subtitle">Enter your credentials to continue</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="your_username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Password">
            </div>
            <button type="submit" class="btn-primary">Login →</button>
        </form>
        <hr class="divider">
        <div class="links">
            <a href="index.html">← Back to Landing Page</a>
            <a href="Register.html">Create an account</a>
            <a href="Forgot_Password.html">Forgot Password?</a>
        </div>
    </div>
    <script>
        let loginForm = document.getElementById("loginForm");
        loginForm.addEventListener("submit", function(e){
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);
            if(user){
                // store logged user
                localStorage.setItem("loggedUser", JSON.stringify(user));
                window.location.href="Dashboard.html";
            }
            else{
                alert("Invalid Username or Password");
            }
        });
    </script>
</body>
</html>
