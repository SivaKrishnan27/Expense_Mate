<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category_view</title>
        <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #cadee4;
            color: black;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #d87979;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .h1 {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .h2 {
            font-size: 14px;
        }
        .headerBar {
            background-color: goldenrod;
            color: #3f362c;
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }

        .title {
            margin-bottom: 20px;
            color: #3f362c;
            font-size: 40px;
            font-weight: bold;
        }

        .topbar {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: normal;
        }

        .currency {
            font-size: 30px;
            font-weight: 300;
        }

        .balance {
            font-size: 30px;
            font-weight: 300;
        }

        .content {
            width: 780px;
            margin: 0 auto;
            padding: 3%;
            padding-left: 6%;
        }

        .secondTitle {
            background-color: #ffcb48;
            color: #333;
            text-align: center;
            padding: 20px;
            font-size: 25px;
        }

        .form {
            padding: 5px;
            padding-top: 20px;
            padding-left: 10%;
            justify-content: center;
            background-color: bisque;
            display: grid;
            grid-template-rows: repeat(5, auto);
        }

        .formLine {
            display: inline-flex;
            padding: 5px 0px;
        }

        .left {
            float: left;
        }

        .right {
            float: right;
            margin-right: 100px;
        }

        input,select {
            width: 130px;
            margin-left: 10px;
        }

        textarea {
            margin-left: 10px;
            resize: vertical;
        }

        /* Button */

        button {
            width: 100px;
            color: #333;
            padding: 10px;
            text-align: center;
            font-size: 1.1em;
            line-height: 20px;
            background-color: #ffcb48;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 0 0 2px grey;
            transition: 0.5s;
        }

        a {
            text-decoration: underline;
            cursor: pointer;
        }
        form > button {
             width: 200px;
            color: #333;
            padding: 10px;
            text-align: center;
            font-size: 1.1em;
            line-height: 20px;
            background-color: #ffcb48;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            display: inline-block;
        }
        div > header{
            display: block;
            unicode-bidi: isolate;
        }
        form{
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: repeat(5, auto) auto;
            grid-gap: 10px 50px;
        }
        
        /* table style */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #8d712a;
            color: white;
            line-height: 30px;
        }

        tbody {
            background-color: bisque;
            line-height: 30px;
            text-align: center;
        }
        .icon{
            display: none;
        }
        @media screen and (max-width:857px){
            .icon{
            display: inline;
            }
            .h1{
            display: none;
            }
            .h1.active{
            display: flex;
            flex-direction: column;
            height: calc(100vh - 480px);
            width: calc(30%);
            top: 8px;
            right: 16px;
            position: absolute;
            top: 30px;
            left: 0px;
            border: 5px solid;
            background-color: #ffcb48;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="Dashboard.html"><img src="Expense_Mate_logo.jpg" alt="Expense Mate Logo" height="50"></a>
        <nav>
            <div class="h1">
                <a href="Expense_List.html">Expense List</a> |
                <a href="Budget_Planner.html">Budget Planner</a> |
                <a href="Category_view.html">Category View</a> |
                <a href="Add_Expense.html">Add Expense</a> |
                <a href="Monthly_Summary.html">Monthly Summary</a>
            </div>
        </nav>
        <nav>
            <div class="h2">
                <button onclick="location.href='help.html'">Help</button> |
                <button onclick="location.href='About.html'">About</button> |
                <button onclick="location.href='Profile.html'">Profile</button> |
                <button onclick="location.href='login.html'">Logout</button>
            </div>
        </nav>
        <div class="icon" onclick="toggle()"><svg width="18px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M0 96C0 78.3 14.3 64 32 64l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 128C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 288c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32L32 448c-17.7 0-32-14.3-32-32s14.3-32 32-32l384 0c17.7 0 32 14.3 32 32z"/></svg></div>
    </header>
    <div class="headerBar">
        <header>
            <h1>Category View</h1>
        </header>
    </div>
    <div class="expense-container">
        <div style="margin-bottom: 15px;" class="secondTitle">
            <label for="category-filter"><strong>Filter by Category:</strong></label>
            <select id="category-filter" onchange="filterExpenses()">
                <option value="All">All Categories</option>
                <option value="Housing">Housing</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Health & Wellness">Health & Wellness</option>
                <option value="Entertainment">Entertainment</option>
            </select>
        </div>
        <table id="expense-table" border="1" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount (&#8377)</th>
                    <th>Type</th>
                </tr>
            </thead>
            <tbody id="expense-list">
                <tr>
                    <td>2026-01-19</td>
                    <td>Monthly Rent</td>
                    <td>Housing</td>
                    <td>1,200.00</td>
                    <td>Income</td>
                </tr>
                <tr>
                    <td>2026-01-19</td>
                    <td>Grocery Store</td>
                    <td>Food</td>
                    <td>85.50</td>
                    <td>Expense</td>
                </tr>
                <tr>
                    <td>2026-01-18</td>
                    <td>Gas Refill</td>
                    <td>Transportation</td>
                    <td>45.00</td>
                    <td>Expense</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
    function filterExpenses() {
        // Get the selected category and the table rows
        const filterValue = document.getElementById("category-filter").value;
        const table = document.getElementById("expense-table");
        const rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");

        // Loop through all rows and hide those that don't match the filter
        for (let i = 0; i < rows.length; i++) {
            // Column index 2 is the 'Category' column
            const categoryCell = rows[i].getElementsByTagName("td")[2];
            
            if (categoryCell) {
            const categoryText = categoryCell.textContent || categoryCell.innerText;
            
            if (filterValue === "All" || categoryText === filterValue) {
                rows[i].style.display = ""; // Show the row
            } else {
                rows[i].style.display = "none"; // Hide the row
            }
            }
        }
    }
    let nav = document.querySelector('.h1');
    function toggle(){
        nav.classList.toggle('active');
    }
    </script>

</body>
</html>
