<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Mate — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #060f06; --bg-card: #0a1f0a;
            --accent: rgb(51,197,51); --accent-bright: rgb(87,208,87);
            --accent-dim: #6db985; --border: rgba(51,197,51,0.2);
            --border-active: rgba(51,197,51,0.55);
        }
        * { box-sizing: border-box; padding: 0; margin: 0; }
        body {
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(160deg, #000 0%, rgb(9,66,9) 100%);
            color: var(--accent);
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(51,197,51,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(51,197,51,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }
        .register-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%; max-width: 500px;
            box-shadow: 0 0 40px rgba(51,197,51,0.1);
            animation: fadeUp 0.6s ease both;
            position: relative; z-index: 1;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logo-row { display: flex; justify-content: center; margin-bottom: 24px; }
        .logo-row img { height: 52px; border-radius: 8px; border: 1px solid var(--border); }
        h1 { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
        .subtitle {
            font-family: 'Space Mono', monospace; font-size: 0.72rem;
            color: var(--accent-dim); text-align: center; margin-bottom: 28px; letter-spacing: 1px;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-family: 'Space Mono', monospace; font-size: 0.68rem;
            letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 6px;
        }
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            border-radius: 6px; color: var(--accent); font-family: 'Space Mono', monospace;
            font-size: 0.85rem; padding: 10px 13px; outline: none; transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus, textarea:focus {
            border-color: var(--border-active); box-shadow: 0 0 0 3px rgba(51,197,51,0.1);
        }
        textarea { resize: vertical; min-height: 70px; }
        .btn-primary {
            width: 100%; background: var(--accent); color: #000; border: none;
            border-radius: 6px; padding: 12px; font-family: 'Syne', sans-serif;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.2s; margin-top: 8px;
        }
        .btn-primary:hover { background: var(--accent-bright); box-shadow: 0 0 20px rgba(51,197,51,0.4); }
        .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
        .links { text-align: center; }
        .links a { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--accent-dim); text-decoration: none; }
        .links a:hover { color: var(--accent); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo-row">
            <img src="Expense_Mate_logo.jpg" alt="Expense Mate Logo">
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Register for Expense Mate</p>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="choose_username">
            </div>
            <div class="form-group">
                <label for="Newpassword">New Password</label>
                <input type="password" id="Newpassword" name="Newpassword" required placeholder="••••••••" pattern=".{8,}">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••" pattern=".{8,}">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="+91 00000 00000">
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" name="address" required placeholder="Your address..."></textarea>
            </div>
            <button type="submit" class="btn-primary">Register →</button>
        </form>
        <hr class="divider">
        <div class="links">
            <a href="index.html">← Back to Landing Page</a>
        </div>
    </div>
    <script>
        document.getElementById("registerForm").addEventListener("submit", function(e){
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("Newpassword").value;
            const confirm = document.getElementById("confirm_password").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const address = document.getElementById("address").value;
            if(password !== confirm){
                alert("Passwords do not match");
                return;
            }
            // Get existing users from localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const exist = users.find(u => u.username === username);
            if(exist){
                alert("User already exists");
                return;
            }
            const newUser = {
                username,
                password,
                email,
                phone,
                address
            };
            console.log("Registering user:", newUser);
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            alert("Registration successful");
            window.location.href="Login.html";
        });
    </script>
</body>
</html>
