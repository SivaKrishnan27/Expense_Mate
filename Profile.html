<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Mate — Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body:#060f06;--bg-card:#0a1f0a;--bg-card2:#0d2b0d;
            --accent:rgb(51,197,51);--accent-bright:rgb(87,208,87);
            --accent-dim:#6db985;--border:rgba(51,197,51,0.2);
            --border-active:rgba(51,197,51,0.55);
            --header-bg:linear-gradient(135deg,#000 0%,rgb(9,66,9) 100%);
            --glow:0 0 20px rgba(51,197,51,0.12);
        }
        *{box-sizing:border-box;padding:0;margin:0;}
        body{font-family:'Syne',sans-serif;min-height:100vh;background:var(--bg-body);color:var(--accent);display:flex;flex-direction:column;}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(51,197,51,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(51,197,51,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
        .topbar-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(0,0,0,0.9);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);flex-wrap:wrap;gap:10px;}
        .topbar-header a img{height:44px;border-radius:8px;border:1px solid var(--border);}
        .nav-links{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
        .nav-links a{font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--accent-dim);text-decoration:none;padding:6px 11px;border:1px solid transparent;border-radius:4px;transition:all 0.2s;white-space:nowrap;}
        .nav-links a:hover,.nav-links a.active{color:var(--accent);border-color:var(--border-active);background:rgba(51,197,51,0.08);}
        .nav-actions{display:flex;align-items:center;gap:6px;}
        .nav-btn{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--accent-dim);background:transparent;border:1px solid var(--border);border-radius:4px;padding:6px 12px;cursor:pointer;transition:all 0.2s;white-space:nowrap;width:auto;}
        .nav-btn:hover{color:var(--accent);border-color:var(--border-active);background:rgba(51,197,51,0.08);box-shadow:none;}
        .nav-btn.logout{color:#ff6b6b;border-color:rgba(255,107,107,0.3);}
        .nav-btn.logout:hover{background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.6);}
        .ham-btn{display:none;background:transparent;border:1px solid var(--border);border-radius:4px;padding:7px 10px;cursor:pointer;color:var(--accent);font-size:1rem;width:auto;}
        .mobile-menu{display:none;flex-direction:column;background:rgba(5,20,5,0.97);border-bottom:1px solid var(--border);padding:12px 20px;gap:0;}
        .mobile-menu a,.mobile-menu button{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--accent-dim);text-decoration:none;padding:10px 0;border-bottom:1px solid var(--border);background:transparent;border-top:none;border-left:none;border-right:none;border-radius:0;width:100%;text-align:left;cursor:pointer;}
        .mobile-menu a:hover,.mobile-menu button:hover{color:var(--accent);}
        .mobile-menu.open{display:flex;}
        @media(max-width:860px){.nav-links,.nav-actions{display:none;}.ham-btn{display:block;}}
        .page-hero{background:var(--header-bg);border-bottom:1px solid var(--border);padding:28px 32px;text-align:center;position:relative;z-index:1;}
        .page-hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--accent);letter-spacing:-0.3px;}
        .page-hero p{font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--accent-dim);margin-top:6px;}
        .balance-line{margin-top:10px;font-family:'Space Mono',monospace;font-size:1.2rem;color:var(--accent-bright);}
        .page-content{max-width:900px;margin:0 auto;padding:28px 24px;width:100%;position:relative;z-index:1;}
        .section-label{font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent-dim);border-left:3px solid var(--accent);padding-left:10px;margin-bottom:14px;}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px;box-shadow:var(--glow);}
        .card p{color:var(--accent-dim);font-size:0.9rem;line-height:1.65;}
        .card ul{color:var(--accent-dim);font-size:0.9rem;line-height:1.9;padding-left:20px;}
        table{width:100%;border-collapse:collapse;}
        thead tr{background:rgba(51,197,51,0.1);border-bottom:1px solid var(--border-active);}
        thead th{font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:12px 14px;text-align:left;}
        tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
        tbody tr:hover{background:rgba(51,197,51,0.04);}
        tbody td{padding:11px 14px;font-size:0.85rem;color:var(--accent-dim);font-family:'Space Mono',monospace;}
        .form-group{margin-bottom:16px;}
        .form-group label,.form-group>span{display:block;font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-dim);margin-bottom:6px;}
        input[type=text],input[type=password],input[type=email],input[type=tel],input[type=date],input[type=number],select,textarea{width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:'Space Mono',monospace;font-size:0.85rem;padding:10px 13px;outline:none;transition:border 0.2s,box-shadow 0.2s;margin:0;}
        input:focus,select:focus,textarea:focus{border-color:var(--border-active);box-shadow:0 0 0 3px rgba(51,197,51,0.1);}
        select option{background:#0a1f0a;}
        textarea{resize:vertical;min-height:80px;}
        .btn{display:inline-block;font-family:'Space Mono',monospace;font-size:0.8rem;font-weight:700;padding:10px 22px;background:var(--accent);color:#000;border:none;border-radius:5px;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;text-decoration:none;width:auto;}
        .btn:hover{background:var(--accent-bright);box-shadow:0 0 16px rgba(51,197,51,0.4);transform:translateY(-1px);}
        .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--border-active);}
        .btn-outline:hover{background:rgba(51,197,51,0.1);box-shadow:0 0 12px rgba(51,197,51,0.2);transform:none;}
        .btn-danger{background:transparent;color:#ff6b6b;border:1px solid rgba(255,107,107,0.35);}
        .btn-danger:hover{background:rgba(255,107,107,0.1);box-shadow:none;transform:none;}
        .btn-sm{padding:6px 14px;font-size:0.72rem;}
        a{color:var(--accent-dim);text-decoration:underline;}a:hover{color:var(--accent);}
        .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
        @media(max-width:620px){.grid-2{grid-template-columns:1fr;}.page-content{padding:16px 14px;}}
        ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#000;}::-webkit-scrollbar-thumb{background:rgba(51,197,51,0.3);border-radius:3px;}
    </style>
</head>
<body>
    <nav class="topbar-header">
        <a href="Dashboard.html"><img src="Expense_Mate_logo.jpg" alt="Expense Mate Logo"></a>
        <div class="nav-links">
            <a href="Expense_List.html">Expense List</a>
            <a href="Budget_Planner.html">Budget Planner</a>
            <a href="Category_view.html">Category View</a>
            <a href="Add_Expense.html">Add Expense</a>
            <a href="Monthly_Summary.html">Monthly Summary</a>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="location.href='help.html'">Help</button>
            <button class="nav-btn" onclick="location.href='About.html'">About</button>
            <button class="nav-btn" onclick="location.href='Profile.html'">Profile</button>
            <button class="nav-btn logout" onclick="location.href='Login.html'">Logout</button>
        </div>
        <button class="ham-btn" onclick="document.getElementById('mobileMenu').classList.toggle('open')">&#9776;</button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <a href="Expense_List.html">Expense List</a>
        <a href="Budget_Planner.html">Budget Planner</a>
        <a href="Category_view.html">Category View</a>
        <a href="Add_Expense.html">Add Expense</a>
        <a href="Monthly_Summary.html">Monthly Summary</a>
        <a href="help.html">Help</a>
        <a href="About.html">About</a>
        <a href="Profile.html">Profile</a>
        <button onclick="location.href='Login.html'">Logout</button>
    </div>
    <div class="page-hero">
        <h1>User Profile</h1>
        <p>Manage your account details</p>
    </div>
    <div class="page-content" style="max-width:560px;">
        <div class="card">
            <form>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" value="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" value="john.doe@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" value="+1234567890">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address">123, Anna Street, Chennai, India</textarea>
                </div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">
                    <button type="submit" class="btn">Update Profile</button>
                    <button type="button" class="btn btn-outline" onclick="location.href='Change_Password.html'">Change Password</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem("loggedUser"));
        if(user){
            document.getElementById("name").value=user.username;
            document.getElementById("email").value=user.email;
            document.getElementById("phone").value=user.phone;
            document.getElementById("address").value=user.address;
        }
        else{
            window.location.href="Login.html";
        }
    </script>
</body>
</html>
